# Configuracion de despliegue en Netlify.
# Sitio estatico (Astro SSG): build con pnpm, publicacion de /dist.
# Netlify detecta pnpm por pnpm-lock.yaml y el campo packageManager de
# package.json (via corepack), y respeta pnpm.onlyBuiltDependencies para
# compilar esbuild/sharp.

[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ---------- Redirects de URLs antiguas (pre multi-categoria) ----------
# Las rutas pasaron de /examen/<modo> a /examen/<categoria>/<modo>. El
# placeholder :modo solo captura un segmento, asi que NO afecta a las nuevas
# /examen/carro/* ni /examen/moto/*. Preserva enlaces externos e indexados.
# Se cubren ambas formas: el canonical antiguo llevaba barra final
# (/examen/<modo>/) y tambien deben redirigir los enlaces sin barra.
[[redirects]]
  from = "/examen/:modo"
  to = "/examen/carro/:modo"
  status = 301

[[redirects]]
  from = "/examen/:modo/"
  to = "/examen/carro/:modo/"
  status = 301

# ---------- Cabeceras de seguridad (todas las rutas) ----------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), interest-cohort=()"
    # CSP para un sitio estatico que usa Supabase desde el cliente (Modelo A: auth + datos via RLS).
    # - script-src 'self': los scripts (Astro, ViewTransitions, tema) se sirven
    #   desde el propio dominio; no hay inline ejecutable.
    # - style-src 'unsafe-inline': Astro inyecta <style> y el quiz fija estilos
    #   inline (p. ej. el ancho de la barra de progreso y el anillo de resultado).
    # - connect-src incluye el origen del proyecto Supabase (auth + datos via RLS);
    #   font/img y el resto quedan en el propio origen (fuentes self-hosted).
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://iucytobyunrjzeqkrfbo.supabase.co wss://iucytobyunrjzeqkrfbo.supabase.co"

# ---------- Cache de assets con hash (inmutables) ----------
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
